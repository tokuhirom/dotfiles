[tools]

"github:tokuhirom/ashron" = "v2026.309.0"

# pipx バックエンドだと python のバージョン 3.13 で削除された audioop に依存しているために動かない。
# uv でもだめ。
# 素直に、uv tool でインストールするしかない。
# "uv:aider-chat" = "0.86.2"

"github:yagi-agent/yagi" = "v0.0.44"
"github:tokuhirom/logcmd" = "v2026.403.0"

"github:k1LoW/mo" = "v1.5.5"

golangci-lint = "2.11.4"
awscli = "2.34.28"
go = '1.26.1'
node = '24.12.0'
python = '3.14.2'
perl = '5.42.0'
uv = '0.10.8'
rust = "1.92.0"
# https://github.com/asdf-community/asdf-php?tab=readme-ov-file#macos
# brew install gmp libsodium imagemagick
# php = "8.3.17"
# gradle が問題起こしがちなので最新の LTS をつかうこと
java = "25.0.1"
ghq = "1.9.4"
# vim = "9.1.1825"
watchexec = "2.3.2"
bun = "1.3.5"
terraform = "1.14.3"
packer = "1.15.1"
# opencode は更新頻度高いので brew によせる。。と思ったが、opencode がぶっ壊れてるケースの絞り込みとかもしたいので難しい。
# opencode = "1.14.20"
"github:k1LoW/git-wt" = "v0.25.0"
dotenvx = "1.51.4"
zellij = "0.43.1"
duckdb = "1.4.4"
codex = "0.139.0"
fd = "10.3.0"
tmux = "3.6a"
crush = "0.43.4"
gemini-cli = "0.30.0"
ruby = "4.0.2"

pi = "0.80.2"

# aws の環境をおそうじするやつ
aws-nuke = "3.65.0"

[settings]
idiomatic_version_file_enable_tools = ["python"]
install_before = "7d"  # only install versions released more than 7 days ago
# プロンプト/status 行でアクティブなツールと env を表示する
status.show_tools = true
status.show_env = true

[settings.ruby]
compile = false

